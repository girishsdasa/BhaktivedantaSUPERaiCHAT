<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F0C08" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230F0C08%22/><text x=%2250%22 y=%2272%22 font-size=%2270%22 font-family=%22Georgia, serif%22 fill=%22%23D4A843%22 text-anchor=%22middle%22>B</text></svg>">
    <title>Bhaktivedānta AI SUPER CHAT</title>
  </head>
  <body>
    <script>
      (function() {
        try {
          const isLight = localStorage.getItem('theme') === 'light' || 
                          (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: light)').matches);
          if (isLight) {
            document.documentElement.classList.add('light');
            document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#F9F6EE');
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
